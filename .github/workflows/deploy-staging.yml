name: Deploy to Staging

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  ARTIFACT_REPO: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ht-phr
  SERVICE_NAME: ctomop-staging
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f Dockerfile.gcp \
            -t ${ARTIFACT_REPO}/ctomop:${IMAGE_TAG} \
            -t ${ARTIFACT_REPO}/ctomop:latest .
          docker push ${ARTIFACT_REPO}/ctomop:${IMAGE_TAG}
          docker push ${ARTIFACT_REPO}/ctomop:latest

      - name: Deploy new revision (no traffic)
        run: |
          gcloud run services update ${SERVICE_NAME} \
            --image ${ARTIFACT_REPO}/ctomop:${IMAGE_TAG} \
            --region ${GCP_REGION} \
            --no-traffic --quiet

      - name: Run database migrations
        run: |
          gcloud run jobs update ${SERVICE_NAME}-migrate \
            --image ${ARTIFACT_REPO}/ctomop:${IMAGE_TAG} \
            --region ${GCP_REGION} --quiet
          gcloud run jobs execute ${SERVICE_NAME}-migrate \
            --region ${GCP_REGION} --wait --quiet

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic ${SERVICE_NAME} \
            --to-latest --region ${GCP_REGION} --quiet
